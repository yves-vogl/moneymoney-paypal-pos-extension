site_name: MoneyMoney PayPal POS Extension
site_description: >
  Community-Extension für MoneyMoney, die PayPal POS (Zettle) als
  unterstützten Kontotyp ergänzt — Kartenumsätze, Refunds, Gebühren
  und Auszahlungen direkt in MoneyMoney.
site_url: https://yves-vogl.github.io/moneymoney-paypal-pos-extension/
repo_url: https://github.com/yves-vogl/moneymoney-paypal-pos-extension
repo_name: yves-vogl/moneymoney-paypal-pos-extension
edit_uri: edit/main/

theme:
  name: material
  language: de
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Dunkles Theme aktivieren
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Helles Theme aktivieren
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

validation:
  links:
    not_found: warn
    absolute_links: info
    unrecognized_links: info

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Übersicht: index.md
  - Installation: installation.md
  - API-Key erzeugen: api-key.md
  - Häufige Fragen: faq.md

# MkDocs serves files inside docs_dir (default: docs/). The .planning/, src/,
# spec/, ADRs, SECURITY.md, CONTRIBUTING.md, CHANGELOG.md and README.md live
# outside docs/ and are intentionally NOT part of the published anwender-doc.
# Repo readers find those via the GitHub repo browser.
exclude_docs: |
  img/README.md
  adr/
  **/.DS_Store
