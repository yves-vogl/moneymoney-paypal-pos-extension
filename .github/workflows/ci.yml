name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  LC_ALL: C

jobs:
  test:
    name: Lint + tests + reproducible build
    runs-on: ubuntu-24.04
    permissions:
      contents: read  # lint, test, build, and gate steps only need read access
    outputs:
      coverage_pct: ${{ steps.coverage.outputs.coverage_pct }}
      coverage_int: ${{ steps.coverage.outputs.coverage_int }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Lua 5.4
        uses: leafo/gh-actions-lua@v13
        with:
          luaVersion: "5.4"

      - name: Set up LuaRocks
        uses: leafo/gh-actions-luarocks@v6.1.0

      - name: Install Lua dependencies
        run: |
          luarocks install busted
          luarocks install luacheck
          luarocks install luacov
          luarocks install dkjson

      - name: Lint with luacheck
        run: luacheck .

      - name: Run busted test suite (with coverage)
        run: busted --coverage spec/

      - name: Generate text coverage report and enforce 85% threshold
        id: coverage
        run: |
          set -e
          luacov
          tail -20 luacov.report.out
          TOTAL_LINE=$(grep -E "^Total" luacov.report.out | tail -1)
          TOTAL_COV_FULL=$(echo "$TOTAL_LINE" | awk '{print $NF}' | sed 's/%//')
          TOTAL_COV=$(echo "$TOTAL_COV_FULL" | cut -d. -f1)
          if [ -z "$TOTAL_COV" ]; then
            echo "FAIL: could not parse coverage percentage from luacov.report.out"
            exit 1
          fi
          if [ "$TOTAL_COV" -lt 85 ]; then
            echo "FAIL: coverage ${TOTAL_COV}% < 85% threshold"
            exit 1
          fi
          echo "OK: coverage ${TOTAL_COV}% meets the 85% threshold"
          # Expose values as job outputs for the badge job (S-07: write permission
          # is scoped to the badge job only, not inherited by all test steps).
          echo "coverage_pct=${TOTAL_COV_FULL}" >> "$GITHUB_OUTPUT"
          echo "coverage_int=${TOTAL_COV}"      >> "$GITHUB_OUTPUT"

      - name: Build amalgamated artifact
        run: lua tools/build.lua

      - name: Verify byte-identical build
        run: lua tools/build.lua --verify

      - name: SEC-04 gate — confirm DEBUG = false in shipped artifact
        run: |
          grep -q 'DEBUG = false' dist/paypal-pos.lua \
            || { echo "FAIL: DEBUG = false missing from dist/paypal-pos.lua"; exit 1; }
          echo "OK: DEBUG = false present"

      - name: Egress allowlist gate — only zettle/izettle hosts in artifact
        run: |
          set -e
          # Primary check: scheme-prefixed URLs.
          BAD=$(grep -Eo 'https?://[^"'"'"' ]+' dist/paypal-pos.lua \
            | grep -v 'oauth\.zettle\.com\|purchase\.izettle\.com\|finance\.izettle\.com' \
            || true)
          if [ -n "$BAD" ]; then
            echo "FAIL: unexpected scheme-prefixed hosts in dist/paypal-pos.lua:"
            echo "$BAD"
            exit 1
          fi
          # S-05 SEC: complementary TLD-pattern grep catches scheme-less
          # hostnames (Connection():get("evil.example.com/path")) that the
          # scheme-prefixed pattern above misses, and string-concatenated URLs
          # (local url = "https://" .. exfil_host .. "/log") where the host
          # token appears without a scheme prefix.
          #
          # The TLD list covers public TLDs most commonly used in exfiltration
          # scenarios. The allowlist mirrors the scheme-prefixed allowlist
          # exactly. Extend the TLD list if a real-world exfil channel surfaces.
          # NOTE on false positives: dotted Lua i18n key namespaces
          # (e.g. "account.purpose.net") incidentally end in TLD-shaped
          # suffixes. We exclude any token whose first label appears to be a
          # known Lua namespace prefix used by the project — extend this list
          # only if a new prefix appears in src/. The allowlist also includes
          # the three legitimate API hosts. The remaining set MUST be empty.
          BAD_BARE=$(grep -Eo '\b([a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?\.)+(com|net|org|io|dev|app|cloud|sh|de|info|co|biz|me|xyz|tech)\b' dist/paypal-pos.lua \
            | sort -u \
            | grep -Ev '^(oauth\.zettle\.com|purchase\.izettle\.com|finance\.izettle\.com)$' \
            | grep -Ev '^(account|transaction|credential|error|purpose|http|finance|mapping|auth|entry)\.' \
            || true)
          if [ -n "$BAD_BARE" ]; then
            echo "FAIL: unexpected scheme-less hostnames in dist/paypal-pos.lua (S-05 SEC):"
            echo "$BAD_BARE"
            exit 1
          fi
          echo "OK: only allowlisted hosts in dist/paypal-pos.lua (scheme + scheme-less)"

      - name: D-79 — no raw print() calls in shipped artifact (must use M_log)
        run: |
          set -e
          # D-79: every shipped log line must flow through M_log.* (which redacts
          # credentials before emitting). The single legitimate raw `print(` call
          # — M_log's emission point in src/log.lua — is marked with the inline
          # sentinel `-- D-79-allowed: M_log emission point`. Any new raw print()
          # introduced anywhere else in the artifact fails this gate.
          #
          # The grep walks dist/paypal-pos.lua, matches lines that have a print(
          # call before any '--' comment marker, excludes lines whose first
          # non-whitespace chars are a comment, and excludes lines carrying the
          # D-79-allowed sentinel.
          BAD=$(grep -nE '^[^-]*print\(' dist/paypal-pos.lua \
            | grep -v '^[[:space:]]*--' \
            | grep -v 'D-79-allowed' \
            || true)
          if [ -n "${BAD}" ]; then
            echo "FAIL: raw print() calls in dist/paypal-pos.lua (must use M_log):"
            echo "${BAD}"
            exit 1
          fi
          echo "OK: no raw print() calls in dist/paypal-pos.lua"

      - name: No-AI-attribution gate
        run: |
          set -e
          # Exclusions:
          # - .planning/ holds policy statements that necessarily quote the
          #   forbidden terms when defining the rule.
          # - CLAUDE.md is a Claude-Code project-instruction convention; it is
          #   tooling configuration, not authorship attribution.
          # - .github/ is the workflow tree which contains the very regex this
          #   step uses; excluding it prevents the step from blocking itself.
          MATCH=$(git grep -nE 'Co-Authored-By:[[:space:]]*Claude|Generated with Claude|🤖' \
            -- . ':!.planning' ':!CLAUDE.md' ':!.github/' || true)
          if [ -n "$MATCH" ]; then
            echo "FAIL: AI-attribution patterns found:"
            echo "$MATCH"
            exit 1
          fi
          echo "OK: no AI-attribution patterns"

  badge:
    name: Refresh coverage badge
    runs-on: ubuntu-24.04
    needs: test
    # Only push the badge when merging to main; skip on PRs and non-main pushes.
    if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write  # required only for this job's push to coverage-badge branch
    steps:
      - name: Generate self-hosted coverage badge (SVG)
        run: |
          set -e
          COVERAGE_PCT="${{ needs.test.outputs.coverage_pct }}"
          COVERAGE_INT="${{ needs.test.outputs.coverage_int }}"
          PCT="${COVERAGE_INT}"
          if   [ "$PCT" -ge 90 ]; then COLOR="#4c1";    LABEL_BG="#555";
          elif [ "$PCT" -ge 80 ]; then COLOR="#97ca00"; LABEL_BG="#555";
          elif [ "$PCT" -ge 70 ]; then COLOR="#dfb317"; LABEL_BG="#555";
          else                          COLOR="#e05d44"; LABEL_BG="#555";
          fi
          mkdir -p /tmp/badge
          cat > /tmp/badge/coverage.svg <<SVG
          <svg xmlns="http://www.w3.org/2000/svg" width="104" height="20" role="img" aria-label="coverage: ${COVERAGE_PCT}%">
            <title>coverage: ${COVERAGE_PCT}%</title>
            <linearGradient id="s" x2="0" y2="100%">
              <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
              <stop offset="1" stop-opacity=".1"/>
            </linearGradient>
            <clipPath id="r"><rect width="104" height="20" rx="3" fill="#fff"/></clipPath>
            <g clip-path="url(#r)">
              <rect width="61" height="20" fill="${LABEL_BG}"/>
              <rect x="61" width="43" height="20" fill="${COLOR}"/>
              <rect width="104" height="20" fill="url(#s)"/>
            </g>
            <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="110">
              <text x="315" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="510">coverage</text>
              <text x="315" y="140" transform="scale(.1)" fill="#fff" textLength="510">coverage</text>
              <text x="815" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="330">${COVERAGE_PCT}%</text>
              <text x="815" y="140" transform="scale(.1)" fill="#fff" textLength="330">${COVERAGE_PCT}%</text>
            </g>
          </svg>
          SVG
          echo "Generated badge for ${COVERAGE_PCT}% (color ${COLOR})"

      - name: Push coverage badge to coverage-badge branch
        run: |
          set -e
          COVERAGE_PCT="${{ needs.test.outputs.coverage_pct }}"
          STAGE=$(mktemp -d)
          cd "$STAGE"
          git init -q
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp /tmp/badge/coverage.svg .
          git checkout -q -b coverage-badge
          git add coverage.svg
          git commit -q -m "ci: refresh coverage badge (${COVERAGE_PCT}%)"
          git push -q --force \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            HEAD:refs/heads/coverage-badge
          echo "Pushed badge to coverage-badge branch"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  secret-scan:
    # CI-05 / D-76 — gitleaks scans for inadvertently committed secrets.
    # 06-02's branch-protection script references this job by its NAME
    # ("gitleaks secret scan"), so the name string is load-bearing.
    # The yves-vogl/paypal-pos-plugin repo is owned by a personal account,
    # so no GITLEAKS_LICENSE secret is required (free for personal use).
    # Pitfall-5 mitigation: .gitleaksignore at repo root carries the
    # per-fingerprint allowlist of audited false positives (JWT-shaped test
    # fixtures + planning-doc dict-key documentation naming `purchaseUUID1`).
    name: gitleaks secret scan
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write   # required so gitleaks can comment on the PR
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
