name: SAST

# Phase 6.1 / SEC-08 / D-33 / D-34 — Semgrep SAST as required check.
#
# Ruleset: p/security-audit + p/secrets (D-34). ERROR-severity findings
# block the workflow (D-33). SARIF results upload to GitHub code-scanning.
#
# Scorecard reporting caveat (RESEARCH §5): ossf/scorecard does not yet
# detect Semgrep — the Scorecard SAST score stays at 0/10 until upstream
# PR ossf/scorecard#5103 merges. ADR-0009 (Plan 06.1-08) documents the
# temporary gap; a backlog issue tracks the upstream merge.
#
# The security control is fully in place regardless of the score lag —
# Semgrep catches real findings and p/secrets reinforces SEC-01 redaction.

on:
  # P6.1-R-07: align push trigger with ci.yml (`branches: ["**"]`) so
  # SAST runs on every branch push, not just main/phase-*. Prevents
  # developer surprise where SAST findings only surface in a PR rather
  # than on a feature-branch push. Matches the consistent dev-experience
  # bar set by ci.yml.
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions: read-all

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install Semgrep (hash-pinned)
        # S-02: hash-pinned install against the generated lockfile.
        # requirements/sast.in declares the top-level pin (semgrep==1.167.0);
        # .lock.txt adds transitive deps with --hash=sha256:... per wheel.
        # Bump Semgrep via manual PR — regenerate via:
        #   pip-compile --generate-hashes -o requirements/sast.lock.txt requirements/sast.in
        run: pip install --require-hashes --no-deps -r requirements/sast.lock.txt

      - name: Run Semgrep (p/security-audit + p/secrets, ERROR-blocking)
        run: |
          set -e
          # Use `semgrep scan` (not `semgrep ci`) — `ci` is hard-wired to the
          # Semgrep AppSec Platform login flow and rejects `--error`. `scan`
          # is the offline-friendly equivalent that honors `--error` to flip
          # the exit code on ERROR-severity findings. Same rules, same SARIF
          # output, no auth needed.
          semgrep scan \
            --config p/security-audit \
            --config p/secrets \
            --error \
            --sarif --output=semgrep.sarif \
            --exclude spec \
            --metrics=off
          echo "OK: Semgrep clean"

      - name: Upload SARIF to GitHub code-scanning
        if: always()  # upload SARIF even when semgrep ci exits non-zero, so findings surface in the UI
        uses: github/codeql-action/upload-sarif@8272c299f21ca24af15dfe9ac0971ba969e5e0d5 # v3.36.2
        with:
          sarif_file: semgrep.sarif
