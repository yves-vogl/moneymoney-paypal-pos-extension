name: Docs

# Phase 6.1 / Plan 06.1-06 / D-37 — MkDocs Material site deployed to GitHub Pages.
#
# Triggers:
#   - push to main → build + deploy to gh-pages
#   - pull_request → build-only (validate diff)
#   - workflow_dispatch → manual rebuild (e.g. after a content-only update
#     that does not trigger CI)
#
# Permissions: top-level read-all; deploy job escalates to pages+id-token+contents:read
# (the minimum required by actions/deploy-pages OIDC verification).

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions: read-all

# Allow only one concurrent Pages deployment per the GitHub-recommended pattern.
# cancel-in-progress: false lets a running deploy finish; queued runs collapse.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build mkdocs site
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install mkdocs + plugins (pinned)
        run: |
          pip install \
            mkdocs==1.6.1 \
            mkdocs-material==9.5.41 \
            mkdocs-static-i18n==1.2.3 \
            mkdocs-include-markdown-plugin==7.1.8  # pinned past CVE-2025-59940 (fixed in 7.1.8+)
          # Pinned versions for deterministic builds. Bump via manual PR;
          # Dependabot does not currently scan the pip ecosystem (tracked
          # as a follow-up to Plan 06.1-05).

      - name: Build site (strict mode)
        run: mkdocs build --strict

      - name: Upload artifact for deploy job
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: site/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      pages: write       # required for actions/deploy-pages
      id-token: write    # required for OIDC verification by deploy-pages
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
