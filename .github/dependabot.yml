version: 2

updates:
  # Keep GitHub Actions pinned to commit-SHA (per SEC-06, post Plan 06.1-01).
  # Dependabot bumps the SHA AND the trailing `# vX.Y.Z` comment in lockstep
  # since Oct 2022 [https://github.blog/changelog/2022-10-31-dependabot-now-updates-comments-in-github-actions-workflows-referencing-action-versions/];
  # behaviour extended Oct 2025 to also CORRECT stale comments when the SHA
  # advances without a tag rename. Maintainers should NOT manually edit the
  # `# vX.Y.Z` comment — let Dependabot do it; manual edits cause merge
  # conflicts on the next Dependabot bump.
  #
  # Grouping (added by Plan 06.1-05): minor + patch SHA bumps coalesce into
  # ONE weekly PR. Major-version bumps stay in separate PRs (they need
  # attention; the breaking-change surface is larger). Without grouping,
  # the 10+ pinned actions would emit 10+ individual PRs per week — review
  # fatigue + queue bloat.
  #
  # LuaRocks is not supported by Dependabot. Lua tooling versions are
  # pinned by the rockspec resolution at install time; CI installs the
  # latest published version of each tool, which keeps the toolchain
  # current without manual bumps.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    commit-message:
      prefix: ci
      include: scope
    labels:
      - dependencies
      - github-actions
    groups:
      actions-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 5

  # S-02 follow-up: Python toolchain (Semgrep, MkDocs + plugins) is
  # hash-pinned in requirements/{docs,sast}.lock.txt. Dependabot scans
  # the top-level `.in` files via `directory: /requirements`; bumps
  # arrive as PRs that update the lockfile (Dependabot re-runs
  # `pip-compile --generate-hashes` and refreshes both .lock.txt files).
  - package-ecosystem: pip
    directory: /requirements
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    commit-message:
      prefix: ci
      include: scope
    labels:
      - dependencies
      - python
    groups:
      pip-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 5
