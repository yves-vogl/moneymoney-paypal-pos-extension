name: OpenSSF Scorecard

on:
  # Re-run weekly so the score reflects current branch-protection and
  # workflow state even when there are no pushes.
  schedule:
    - cron: "0 6 * * 1"
  # Run on every push to the default branch.
  push:
    branches: [main]
  # Re-evaluate when branch-protection rules change (most direct signal
  # for the Branch-Protection check).
  branch_protection_rule:

# Declare default read-only access for the whole workflow. Individual
# steps that need more (SARIF upload, OIDC for the OpenSSF publish call)
# escalate at the job level below.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    # P6.1-R-06: pin to ubuntu-24.04 to match every other workflow in the
    # repo (ci/release/commit-lint/sast/docs all use ubuntu-24.04). Avoids
    # silent drift when GitHub flips the `ubuntu-latest` floor.
    runs-on: ubuntu-24.04
    permissions:
      # Upload findings to the GitHub code-scanning UI.
      security-events: write
      # OIDC token so scorecard-action can publish to api.securityscorecards.dev.
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          # Fine-grained PAT with Administration:read on this repo only.
          # Required so the Branch-Protection Scorecard check can
          # introspect main's protection state. Yves provisions and
          # rotates per the SECURITY.md "Lieferketten-Kontrollen"
          # section (rotation cadence: 1 year). If the secret is unset,
          # scorecard-action falls back to GITHUB_TOKEN which cannot
          # read branch-protection — Branch-Protection.score returns
          # -1 (unreadable). See RESEARCH §4 + Pitfall 8.
          repo_token: ${{ secrets.SCORECARD_READ_TOKEN }}
          results_file: results.sarif
          results_format: sarif
          # Publishes the score to api.securityscorecards.dev so the
          # README badge can read it. Public-good infrastructure run by
          # the Open Source Security Foundation (Linux Foundation).
          publish_results: true

      - name: Upload SARIF as workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to GitHub code-scanning
        uses: github/codeql-action/upload-sarif@8272c299f21ca24af15dfe9ac0971ba969e5e0d5 # v3.36.2
        with:
          sarif_file: results.sarif
